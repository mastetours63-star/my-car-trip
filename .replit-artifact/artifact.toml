kind = "mobile"
previewPath = "/"
title = "My Car Trip"
version = "1.0.0"
id = "artifacts/my-car-trip"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24613

[services.development]
run = "pnpm --filter @workspace/my-car-trip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/my-car-trip", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/my-car-trip", "run", "serve" ]

[services.env]
PORT = "24613"
BASE_PATH = "/"
